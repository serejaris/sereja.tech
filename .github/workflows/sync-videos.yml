name: Sync videos

on:
  schedule:
    - cron: '30 7,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync data/videos.yml from YouTube RSS
        run: python3 scripts/sync-videos.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/videos.yml; then
            echo "No changes to data/videos.yml"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/videos.yml
          git commit -m "chore(videos): sync from YouTube RSS"
          git push
