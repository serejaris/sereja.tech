<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Схема: пайплайн поста с картинкой</title>
  <desc id="desc">Пример пайплайна для публикации поста с картинкой: текст, картинка, dry-run, ограничение подписи, сжатие и read-back.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#071a12"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .lane { fill: rgba(15, 23, 42, .72); stroke: #1f2937; stroke-width: 2; rx: 26; }
      .node { fill: #101827; stroke: #38bdf8; stroke-width: 2; rx: 22; }
      .check { fill: #10251b; stroke: #4ade80; stroke-width: 2; rx: 22; }
      .warn { fill: #241b12; stroke: #f59e0b; stroke-width: 2; rx: 22; }
      .arrow { stroke: #e2e8f0; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .title { fill: #f8fafc; font-family: Inter, Arial, sans-serif; font-size: 48px; font-weight: 850; }
      .subtitle { fill: #bae6fd; font-family: Inter, Arial, sans-serif; font-size: 24px; font-weight: 650; }
      .lane-title { fill: #94a3b8; font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
      .label { fill: #f8fafc; font-family: Inter, Arial, sans-serif; font-size: 26px; font-weight: 820; }
      .small { fill: #cbd5e1; font-family: Inter, Arial, sans-serif; font-size: 19px; font-weight: 520; }
      .mono { fill: #86efac; font-family: JetBrains Mono, Menlo, monospace; font-size: 18px; font-weight: 700; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="700"/>
  <text x="70" y="82" class="title">Пример: пост с картинкой</text>
  <text x="72" y="123" class="subtitle">Пайплайн нужен не для красоты. Он ловит места, где всё обычно ломается.</text>

  <rect x="70" y="170" width="1060" height="175" class="lane"/>
  <text x="95" y="205" class="lane-title">Подготовка</text>
  <g transform="translate(95 235)">
    <rect class="node" width="220" height="84"/>
    <text x="24" y="36" class="label">Текст</text>
    <text x="24" y="64" class="small">источник и канон</text>
  </g>
  <path class="arrow" d="M330 277H392"/><path class="arrow" d="M382 263L402 277L382 291"/>
  <g transform="translate(420 235)">
    <rect class="node" width="220" height="84"/>
    <text x="24" y="36" class="label">Картинка</text>
    <text x="24" y="64" class="small">стабильный asset</text>
  </g>
  <path class="arrow" d="M655 277H717"/><path class="arrow" d="M707 263L727 277L707 291"/>
  <g transform="translate(745 235)">
    <rect class="check" width="300" height="84"/>
    <text x="24" y="36" class="label">Файл сообщения</text>
    <text x="24" y="64" class="small">один источник перед отправкой</text>
  </g>

  <rect x="70" y="385" width="1060" height="235" class="lane"/>
  <text x="95" y="420" class="lane-title">Отправка</text>
  <g transform="translate(95 450)">
    <rect class="check" width="210" height="96"/>
    <text x="24" y="38" class="label">Dry-run</text>
    <text x="24" y="68" class="mono">sent=false</text>
  </g>
  <path class="arrow" d="M320 498H380"/><path class="arrow" d="M370 484L390 498L370 512"/>
  <g transform="translate(410 450)">
    <rect class="warn" width="250" height="96"/>
    <text x="24" y="38" class="label">Лимит</text>
    <text x="24" y="68" class="small">caption до 1024 символов</text>
  </g>
  <path class="arrow" d="M675 498H735"/><path class="arrow" d="M725 484L745 498L725 512"/>
  <g transform="translate(765 450)">
    <rect class="check" width="285" height="96"/>
    <text x="24" y="38" class="label">Live + read-back</text>
    <text x="24" y="68" class="small">проверить, что увидел читатель</text>
  </g>

  <text x="93" y="600" class="small">Если шаг повторяется второй раз, это уже не импровизация. Это кандидат в runbook.</text>
</svg>
