<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Схема: как ручной прогон становится пайплайном</title>
  <desc id="desc">Живой прогон превращается в рецепт, dry-run, работу агента и проверку результата.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#080b10"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .grid { stroke: #223044; stroke-width: 1; opacity: .35; }
      .card { fill: #0f172a; stroke: #4ade80; stroke-width: 2; rx: 24; }
      .card-muted { fill: #111827; stroke: #64748b; stroke-width: 1.4; rx: 24; }
      .arrow { stroke: #4ade80; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow); }
      .title { fill: #f8fafc; font-family: Inter, Arial, sans-serif; font-size: 48px; font-weight: 800; }
      .label { fill: #f8fafc; font-family: Inter, Arial, sans-serif; font-size: 28px; font-weight: 800; }
      .small { fill: #cbd5e1; font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 500; }
      .num { fill: #0b1220; font-family: Inter, Arial, sans-serif; font-size: 24px; font-weight: 900; }
      .badge { fill: #4ade80; }
      .note { fill: #a7f3d0; font-family: Inter, Arial, sans-serif; font-size: 24px; font-weight: 700; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <g opacity=".45">
    <path class="grid" d="M0 120H1200M0 240H1200M0 360H1200M0 480H1200"/>
    <path class="grid" d="M120 0V620M240 0V620M360 0V620M480 0V620M600 0V620M720 0V620M840 0V620M960 0V620M1080 0V620"/>
  </g>
  <text x="70" y="82" class="title">Пайплайн появляется после первого прогона</text>
  <text x="72" y="125" class="note">Не схема в голове. Цепочка, которую уже довели до результата.</text>

  <g transform="translate(70 210)">
    <rect class="card-muted" width="190" height="170"/>
    <circle class="badge" cx="36" cy="38" r="20"/><text x="29" y="47" class="num">1</text>
    <text x="28" y="92" class="label">Живой</text>
    <text x="28" y="126" class="label">прогон</text>
    <text x="28" y="154" class="small">что реально</text>
  </g>
  <path class="arrow" d="M285 295H350"/><path class="arrow" d="M340 280L360 295L340 310"/>

  <g transform="translate(380 210)">
    <rect class="card" width="190" height="170"/>
    <circle class="badge" cx="36" cy="38" r="20"/><text x="29" y="47" class="num">2</text>
    <text x="28" y="100" class="label">Рецепт</text>
    <text x="28" y="136" class="small">шаги и</text>
    <text x="28" y="160" class="small">развилки</text>
  </g>
  <path class="arrow" d="M595 295H660"/><path class="arrow" d="M650 280L670 295L650 310"/>

  <g transform="translate(690 210)">
    <rect class="card" width="190" height="170"/>
    <circle class="badge" cx="36" cy="38" r="20"/><text x="29" y="47" class="num">3</text>
    <text x="28" y="100" class="label">Dry-run</text>
    <text x="28" y="136" class="small">проверка до</text>
    <text x="28" y="160" class="small">отправки</text>
  </g>
  <path class="arrow" d="M905 295H970"/><path class="arrow" d="M960 280L980 295L960 310"/>

  <g transform="translate(1000 210)">
    <rect class="card" width="150" height="170"/>
    <circle class="badge" cx="36" cy="38" r="20"/><text x="29" y="47" class="num">4</text>
    <text x="28" y="100" class="label">Агент</text>
    <text x="28" y="136" class="small">ускоряет</text>
    <text x="28" y="160" class="small">стабильное</text>
  </g>

  <g transform="translate(380 445)">
    <rect class="card-muted" width="500" height="95"/>
    <text x="28" y="40" class="label">Проверка остаётся отдельным шагом</text>
    <text x="28" y="73" class="small">read-back, критерий готовности, запись результата</text>
  </g>
  <path class="arrow" d="M1075 390C1050 500 950 505 895 493"/><path class="arrow" d="M910 480L885 491L906 510"/>
</svg>
