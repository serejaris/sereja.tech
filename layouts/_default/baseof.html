<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>

  {{- partial "seo.html" . -}}
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0b0d10" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
  <link rel="alternate" type="text/plain" href="/llms.txt" title="LLM-optimized content">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* ===== Токены: один акцент #ff1341 ===== */
    :root {
      --bg: #0b0d10;
      --surface: #12161b;
      --surface-2: #171c22;
      --ink: #e9edf1;
      --muted: #8a9199;
      --muted-2: #aab2ba;
      --line: #22282f;
      --line-strong: #323b45;
      --accent: #ff1341;
      --accent-text: #ff4d6e;
      --accent-soft: rgba(255, 19, 65, .1);
      --green: #4ade80;
      --red: #f87171;
      --font-sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-display: "Inter Tight", "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-2: #eef1f4;
        --ink: #14181d;
        --muted: #5c656e;
        --muted-2: #4b545e;
        --line: #dfe4ea;
        --line-strong: #c2cad3;
        --accent-text: #e00e39;
        --accent-soft: rgba(255, 19, 65, .06);
      }
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.7;
      background: var(--bg);
      color: var(--ink);
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--accent); color: #fff; }
    a { color: var(--accent-text); text-decoration: none; }
    a:hover { text-decoration: underline; text-underline-offset: 3px; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }
    img { max-width: 100%; height: auto; display: block; }

    .wrap { max-width: 1060px; margin: 0 auto; padding: 0 24px; }

    /* ===== Каркас ===== */
    .site-head {
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 50;
    }
    .site-head .wrap {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 16px; padding-bottom: 16px; gap: 10px 16px; flex-wrap: wrap;
    }
    .wordmark {
      font-family: var(--font-display); font-weight: 800; font-size: 17px;
      color: var(--ink); letter-spacing: -0.01em; text-decoration: none;
    }
    .wordmark:hover { text-decoration: none; }
    .wordmark .a { color: var(--accent); }
    .site-nav { display: flex; gap: 22px; font-size: 14px; font-weight: 500; }
    .site-nav a { color: var(--muted); padding-bottom: 2px; }
    .site-nav a:hover { color: var(--ink); text-decoration: none; }
    .site-nav a.active { color: var(--ink); box-shadow: inset 0 -2px 0 var(--accent); }

    main.wrap { padding-top: 48px; padding-bottom: 80px; }

    .site-foot { border-top: 1px solid var(--line); color: var(--muted); font-size: 13.5px; }
    .site-foot .wrap {
      display: flex; flex-wrap: wrap; gap: 8px 24px;
      align-items: baseline; justify-content: space-between;
      padding-top: 24px; padding-bottom: 30px;
    }
    .site-foot a { color: var(--muted); }
    .site-foot a:hover { color: var(--accent-text); }
    .site-foot .foot-links { display: flex; gap: 18px; }

    /* ===== Типографика ===== */
    h1, h2, h3, h4 { font-family: var(--font-display); line-height: 1.2; font-weight: 800; letter-spacing: -0.015em; }
    .display {
      font-size: clamp(34px, 5.5vw, 52px);
      margin: 0 0 16px;
    }
    .kind-home .display::after { content: "."; color: var(--accent); }
    h2 { font-size: 22px; margin: 36px 0 12px; }
    h3 { font-size: 18px; margin: 28px 0 10px; }
    p { margin: 0 0 15px; }
    .muted { color: var(--muted); }
    .crumb { font-size: 13.5px; margin-bottom: 24px; }
    .crumb a { color: var(--muted); }
    .crumb a:hover { color: var(--accent-text); }

    .eyebrow {
      display: flex; align-items: center; gap: 12px;
      color: var(--ink); font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .14em;
      margin: 60px 0 20px;
    }
    .eyebrow::before { content: ""; width: 8px; height: 8px; background: var(--accent); flex-shrink: 0; }
    .eyebrow::after { content: ""; flex: 1; border-top: 1px solid var(--line-strong); }
    .eyebrow .count { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: .01em; }

    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .hero > * { animation: rise .5s ease both; }
    .hero > *:nth-child(2) { animation-delay: .07s; }
    .hero > *:nth-child(3) { animation-delay: .14s; }

    /* ===== Hero ===== */
    .hero { padding: 40px 0 4px; }
    .lead { font-size: 18px; max-width: 60ch; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
    .chip {
      display: inline-flex; align-items: center;
      border: 1px solid var(--line-strong); background: var(--surface);
      color: var(--ink); padding: 9px 16px; border-radius: 999px;
      font-size: 14px; font-weight: 500; text-decoration: none;
      transition: border-color .15s, transform .15s, color .15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent-text); transform: translateY(-1px); text-decoration: none; }

    /* ===== Карточки постов ===== */
    .cards {
      display: grid; gap: 18px;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    }
    .card {
      display: flex; flex-direction: column;
      border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
      background: var(--surface); color: var(--ink); text-decoration: none;
      transition: border-color .15s, transform .15s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-3px); text-decoration: none; }
    .card img { aspect-ratio: 1200 / 630; object-fit: cover; width: 100%; border-bottom: 1px solid var(--line); }
    .card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .card-title { font-weight: 600; font-size: 15px; line-height: 1.45; letter-spacing: -0.005em; }
    .card:hover .card-title { color: var(--accent-text); }
    .card .date { margin: auto 0 0; }

    /* ===== Списки постов ===== */
    .posts { list-style: none; padding: 0; margin: 0 0 8px; }
    .posts li {
      display: flex; gap: 14px; align-items: baseline;
      padding: 8px 0; border-bottom: 1px solid var(--line);
    }
    .posts li:last-child { border-bottom: 0; }
    .posts a { color: var(--ink); }
    .posts a:hover { color: var(--accent-text); text-decoration: none; }
    .date { color: var(--muted); font-size: 13px; flex-shrink: 0; min-width: 72px; font-variant-numeric: tabular-nums; }
    .month-head {
      color: var(--muted); font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .1em;
      margin: 32px 0 4px; padding-bottom: 8px;
      border-bottom: 1px solid var(--line-strong);
    }

    /* ===== Ссылки-списки ===== */
    .links { list-style: none; padding: 0; margin: 0; }
    .links li { padding: 9px 0; border-bottom: 1px solid var(--line); }
    .links li:last-child { border-bottom: 0; }
    .links .desc { color: var(--muted); font-size: 14px; }

    /* ===== YouTube ===== */
    .yt-feature {
      border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
      background: var(--surface);
    }
    .yt-feature iframe { width: 100%; aspect-ratio: 16/9; border: 0; display: block; }
    .yt-feature .yt-cap {
      display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
      padding: 12px 16px; font-size: 13.5px; color: var(--muted);
      border-top: 1px solid var(--line);
    }
    .video-list { list-style: none; padding: 0; margin: 14px 0 0; display: grid; gap: 10px; }
    @media (min-width: 760px) { .video-list { grid-template-columns: 1fr 1fr; } }
    .video-item {
      display: flex; gap: 14px; align-items: center;
      border: 1px solid var(--line); border-radius: 10px; background: var(--surface);
      padding: 10px 14px 10px 10px; color: var(--ink); text-decoration: none;
      transition: border-color .15s, transform .15s;
    }
    .video-item:hover { border-color: var(--accent); transform: translateY(-1px); text-decoration: none; }
    .video-item img { width: 96px; height: 54px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }
    .video-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .video-title { font-size: 14px; font-weight: 500; }
    .video-item:hover .video-title { color: var(--accent-text); }

    /* ===== Теги ===== */
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 22px; }
    .tag {
      font-size: 12.5px; font-weight: 500; color: var(--muted-2);
      border: 1px solid var(--line); border-radius: 999px;
      padding: 4px 12px; text-decoration: none;
      transition: color .15s, border-color .15s;
    }
    .tag:hover { color: var(--accent-text); border-color: var(--accent); text-decoration: none; }

    /* ===== Поиск ===== */
    .search-box {
      display: flex; align-items: center;
      border: 1px solid var(--line-strong); border-radius: 10px; background: var(--surface);
      padding: 0 16px; margin: 20px 0 28px;
    }
    .search-box input {
      flex: 1; font: inherit; font-size: 15px;
      background: none; border: 0; outline: none;
      color: var(--ink); padding: 13px 0;
    }
    .search-box input::placeholder { color: var(--muted); }
    .search-box:focus-within { border-color: var(--accent); }
    .search-count { color: var(--muted); font-size: 13.5px; }
    .search-snippet { display: block; font-size: 13.5px; color: var(--muted); margin-top: 2px; }
    .search-snippet mark { background: var(--accent); color: #fff; padding: 0 2px; border-radius: 2px; }

    /* ===== Статья ===== */
    .prose { max-width: 70ch; }
    .post-title {
      font-size: clamp(26px, 3.8vw, 38px);
      margin: 4px 0 10px;
    }
    .post-cover {
      border: 1px solid var(--line); border-radius: 10px;
      margin: 22px 0 28px; width: 100%;
    }
    .post-meta { color: var(--muted); font-size: 14px; margin: 0 0 14px; }
    .post-meta .dot { color: var(--accent); }
    .intro { color: var(--muted); font-size: 16.5px; margin-bottom: 24px; }
    .prose h2 { margin-top: 44px; }
    .prose a { text-decoration: underline; text-underline-offset: 3px; text-decoration-color: color-mix(in srgb, var(--accent) 55%, transparent); }
    .prose a:hover { text-decoration-color: var(--accent); }
    ul, ol { margin: 12px 0; padding-left: 1.3em; }
    li { margin-bottom: 5px; }
    li::marker { color: var(--accent); }
    figure { margin: 26px 0; }
    .content img { border: 1px solid var(--line); border-radius: 10px; margin: 26px auto; }
    figcaption { font-size: 13.5px; color: var(--muted); margin-top: 8px; }
    blockquote {
      border-left: 3px solid var(--accent);
      background: var(--surface);
      margin: 22px 0; padding: 12px 18px;
      font-style: italic; border-radius: 0 8px 8px 0;
    }
    blockquote p { margin: 0; }
    table { width: 100%; border-collapse: collapse; margin: 22px 0; font-size: 14.5px; }
    th, td { border: 1px solid var(--line); padding: 8px 12px; text-align: left; vertical-align: top; }
    th { background: var(--surface); }
    hr { border: 0; border-top: 1px solid var(--line); margin: 36px 0; }

    code {
      font-family: var(--font-mono); font-size: .86em;
      background: var(--surface-2); border: 1px solid var(--line);
      padding: 1px 5px; border-radius: 4px;
    }
    pre {
      background: var(--surface) !important;
      border: 1px solid var(--line); border-radius: 10px;
      padding: 16px 18px; overflow-x: auto;
      font-size: 13.5px; line-height: 1.6; margin: 24px 0;
    }
    pre code { background: none; border: 0; padding: 0; }
    .highlight pre { background: var(--surface) !important; }
    pre.mermaid { background: transparent !important; border: 0; padding: 8px 0; text-align: center; }
    pre.mermaid svg { max-width: 100%; height: auto; }
    .code-block { position: relative; margin: 24px 0; }
    .code-block pre { margin: 0; }
    .code-copy, .callout-copy {
      position: absolute; top: 8px; right: 8px;
      font: 12px var(--font-sans); color: var(--muted);
      background: var(--surface-2); border: 1px solid var(--line);
      border-radius: 6px; padding: 3px 9px; cursor: pointer;
    }
    .code-copy:hover, .callout-copy:hover { color: var(--accent-text); border-color: var(--accent); }

    .callout {
      position: relative;
      border: 1px solid var(--line); border-left: 3px solid var(--accent);
      background: var(--surface); border-radius: 0 10px 10px 0;
      padding: 14px 18px; margin: 22px 0;
    }
    .callout.warning { border-left-color: var(--red); }
    .callout.insight { border-left-color: var(--green); }
    .callout.cta { border-color: var(--accent); background: var(--accent-soft); }
    .callout strong { display: block; margin-bottom: 4px; }
    .callout p:last-child { margin-bottom: 0; }
    .callout-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .callout-head strong { margin-bottom: 0; font-size: 14px; }
    .callout-copy { position: static; flex-shrink: 0; }

    .sources, .related-posts { margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--line); }
    .sources h3, .related-posts h3 { font-size: 15px; margin: 0 0 10px; }
    .sources ul, .related-posts ul { list-style: none; padding: 0; margin: 0; }
    .sources li, .related-posts li { margin-bottom: 6px; }

    .rel-cards { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); margin-top: 14px; }
    .rel-cards .card-title { font-size: 13.5px; }

    .subscribe-inline {
      margin: 36px 0 8px; padding: 16px 18px;
      border: 1px solid var(--accent); background: var(--accent-soft);
      border-radius: 10px; font-size: 14.5px;
    }

    .author-link { font-size: 14px; }

    @media (prefers-color-scheme: light) {
      .card, .video-item, .yt-feature, pre, .content img { border-color: var(--line-strong); }
    }

    /* ===== Адаптив ===== */
    @media (max-width: 640px) {
      main.wrap { padding-top: 32px; }
      .site-nav { gap: 16px; }
      .hero { padding-top: 24px; }
      .posts li { flex-direction: column; gap: 0; padding: 12px 0; }
      .date { min-width: 0; }
      .video-item img { width: 80px; height: 45px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body class="kind-{{ .Kind }} section-{{ .Section }}">
  <header class="site-head">
    <div class="wrap">
      <a class="wordmark" href="/">sereja<span class="a">.</span>tech</a>
      <nav class="site-nav" aria-label="Основная навигация">
        <a href="/blog/"{{ if eq .Section "blog" }} class="active"{{ end }}>Блог</a>
        <a href="/about/"{{ if eq .Section "about" }} class="active"{{ end }}>Обо мне</a>
        <a href="https://t.me/ris_ai?utm_source=sereja_tech&utm_medium=link&utm_campaign=nav" target="_blank" rel="noopener">Телеграм</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-foot">
    <div class="wrap">
      <span>© 2026 Сережа Рис · sereja.tech</span>
      <span class="foot-links">
        <a href="https://t.me/ris_ai?utm_source=sereja_tech&utm_medium=link&utm_campaign=footer" target="_blank" rel="noopener">Телеграм</a>
        <a href="https://www.youtube.com/@serejaris?utm_source=sereja_tech&utm_medium=link&utm_campaign=footer" target="_blank" rel="noopener">YouTube</a>
        <a href="https://github.com/serejaris" target="_blank" rel="noopener">GitHub</a>
        <a href="/index.xml">RSS</a>
      </span>
    </div>
  </footer>

  <script defer src="/_vercel/insights/script.js"></script>
  {{ if .IsPage }}<script src="/analytics.js"></script>{{ end }}
  {{ if .Store.Get "hasMermaid" }}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'neutral', securityLevel: 'strict', htmlLabels: true });
  </script>
  {{ end }}
</body>
</html>
