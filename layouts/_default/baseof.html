<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>

  {{- partial "seo.html" . -}}
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0b0d10" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
  <link rel="alternate" type="text/plain" href="/llms.txt" title="LLM-optimized content">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;0,800;1,400&display=swap" rel="stylesheet">

  <style>
    /* ===== Токены: фосфорная консоль ===== */
    :root {
      --bg: #0b0d10;
      --surface: #12161b;
      --surface-2: #171c22;
      --ink: #e9edf1;
      --muted: #8a9199;
      --muted-2: #aab2ba;
      --line: #22282f;
      --line-strong: #323b45;
      --cyan: #5be3e3;
      --cyan-dim: #2b8f8f;
      --magenta: #ff4d8d;
      --green: #4ade80;
      --red: #f87171;
      --ghost: rgba(91, 227, 227, .55);
      --ghost-2: rgba(255, 77, 141, .35);
      --font: "JetBrains Mono", ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-2: #eef1f4;
        --ink: #14181d;
        --muted: #5c656e;
        --muted-2: #4b545e;
        --line: #dfe4ea;
        --line-strong: #c2cad3;
        --cyan: #0e7c86;
        --cyan-dim: #4aa9b0;
        --magenta: #d61f69;
        --green: #15803d;
        --red: #b91c1c;
        --ghost: rgba(14, 124, 134, .28);
        --ghost-2: rgba(214, 31, 105, .2);
      }
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      font-size: 15.5px;
      line-height: 1.75;
      background: var(--bg);
      color: var(--ink);
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--magenta); color: #fff; }
    a { color: var(--cyan); text-decoration: none; }
    a:hover { text-decoration: underline; text-underline-offset: 3px; }
    :focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; border-radius: 2px; }
    img { max-width: 100%; height: auto; display: block; }

    .wrap { max-width: 1060px; margin: 0 auto; padding: 0 24px; }

    /* ===== Каркас ===== */
    .site-head {
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 50;
    }
    .site-head .wrap {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 14px; padding-bottom: 14px; gap: 10px 16px; flex-wrap: wrap;
    }
    .wordmark {
      font-weight: 800; font-size: 16px; color: var(--magenta);
      letter-spacing: .02em; text-decoration: none;
    }
    .wordmark:hover { text-decoration: none; }
    .wordmark::after {
      content: "▮"; color: var(--cyan); margin-left: 2px;
      animation: blink 1.1s steps(1) infinite;
    }
    .site-nav { display: flex; gap: 20px; font-size: 13.5px; }
    .site-nav a { color: var(--muted); }
    .site-nav a:hover { color: var(--cyan); text-decoration: none; }
    .site-nav a.active { color: var(--cyan); }
    .site-nav a.active::before { content: "● "; color: var(--magenta); font-size: 9px; vertical-align: 2px; }

    main.wrap { padding-top: 40px; padding-bottom: 72px; }

    .site-foot { border-top: 1px solid var(--line); color: var(--muted); font-size: 13px; }
    .site-foot .wrap {
      display: flex; flex-wrap: wrap; gap: 8px 24px;
      align-items: baseline; justify-content: space-between;
      padding-top: 22px; padding-bottom: 28px;
    }
    .site-foot a { color: var(--muted); }
    .site-foot a:hover { color: var(--cyan); }
    .site-foot .foot-links { display: flex; gap: 18px; }

    /* ===== Типографика ===== */
    h1, h2, h3, h4 { line-height: 1.25; font-weight: 800; }
    .display {
      font-size: clamp(30px, 5.2vw, 46px);
      letter-spacing: -0.01em;
      margin: 10px 0 14px;
      text-shadow: 3px 3px 0 var(--ghost);
    }
    @media (prefers-color-scheme: light) {
      .display { text-shadow: 2px 2px 0 var(--ghost); }
    }
    h2 { font-size: 21px; margin: 34px 0 12px; }
    h3 { font-size: 17px; margin: 28px 0 10px; }
    p { margin: 0 0 15px; }
    .muted { color: var(--muted); }
    .crumb { font-size: 13px; margin-bottom: 22px; }
    .crumb a { color: var(--muted); }
    .crumb a:hover { color: var(--cyan); }

    .eyebrow {
      display: flex; align-items: baseline; gap: 12px;
      color: var(--cyan); font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .14em;
      margin: 56px 0 18px;
    }
    .eyebrow::before { content: "▮"; color: var(--magenta); letter-spacing: 0; }
    .eyebrow::after { content: ""; flex: 1; border-top: 1px solid var(--line-strong, var(--line)); transform: translateY(-3px); }
    .eyebrow .count { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: .02em; }

    @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
    .cursor { color: var(--cyan); animation: blink 1.1s steps(1) infinite; }

    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .hero > * { animation: rise .5s ease both; }
    .hero > *:nth-child(2) { animation-delay: .07s; }
    .hero > *:nth-child(3) { animation-delay: .14s; }
    .hero > *:nth-child(4) { animation-delay: .21s; }

    /* ===== Hero ===== */
    .hero { padding: 42px 0 8px; }
    .prompt { color: var(--muted); font-size: 14px; margin-bottom: 4px; }
    .prompt b { color: var(--cyan); font-weight: 400; }
    .lead { font-size: 17px; max-width: 62ch; color: var(--ink); }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
    .chip {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--ink); padding: 8px 14px; border-radius: 6px;
      font-size: 13.5px; text-decoration: none;
      transition: border-color .15s, transform .15s, color .15s;
    }
    .chip:hover { border-color: var(--cyan); color: var(--cyan); transform: translateY(-1px); text-decoration: none; }
    .chip .k { color: var(--magenta); }

    /* ===== Карточки постов ===== */
    .cards {
      display: grid; gap: 18px;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    }
    .card {
      display: flex; flex-direction: column;
      border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
      background: var(--surface); color: var(--ink); text-decoration: none;
      transition: border-color .15s, transform .15s;
    }
    .card:hover { border-color: var(--cyan); transform: translateY(-3px); text-decoration: none; }
    .card img { aspect-ratio: 1200 / 630; object-fit: cover; width: 100%; border-bottom: 1px solid var(--line); }
    .card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .card-title { font-weight: 700; font-size: 15px; line-height: 1.45; }
    .card:hover .card-title { color: var(--cyan); }
    .card .date { margin: auto 0 0; }

    /* ===== Списки постов ===== */
    .posts { list-style: none; padding: 0; margin: 0 0 8px; }
    .posts li {
      display: flex; gap: 14px; align-items: baseline;
      padding: 7px 0; border-bottom: 1px dashed var(--line);
    }
    .posts li:last-child { border-bottom: 0; }
    .posts a { color: var(--ink); }
    .posts a:hover { color: var(--cyan); text-decoration: none; }
    .date { color: var(--muted); font-size: 13px; flex-shrink: 0; min-width: 86px; font-variant-numeric: tabular-nums; }
    .month-head {
      color: var(--muted); font-size: 13px; font-weight: 700;
      text-transform: lowercase; letter-spacing: .1em;
      margin: 30px 0 6px;
    }
    .month-head::before { content: "## "; color: var(--cyan-dim); }

    /* ===== YouTube ===== */
    .yt-feature {
      border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
      background: var(--surface);
    }
    .yt-feature iframe { width: 100%; aspect-ratio: 16/9; border: 0; display: block; }
    .yt-feature .yt-cap {
      display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
      padding: 10px 14px; font-size: 13px; color: var(--muted);
      border-top: 1px solid var(--line);
    }
    .video-list { list-style: none; padding: 0; margin: 14px 0 0; display: grid; gap: 10px; }
    @media (min-width: 760px) { .video-list { grid-template-columns: 1fr 1fr; } }
    .video-item {
      display: flex; gap: 14px; align-items: center;
      border: 1px solid var(--line); border-radius: 8px; background: var(--surface);
      padding: 10px 14px 10px 10px; color: var(--ink); text-decoration: none;
      transition: border-color .15s, transform .15s;
    }
    .video-item:hover { border-color: var(--cyan); transform: translateY(-1px); text-decoration: none; }
    .video-item img { width: 96px; height: 54px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .video-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .video-title { font-size: 14px; font-weight: 500; }
    .video-item:hover .video-title { color: var(--cyan); }

    /* ===== Теги ===== */
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 20px; }
    .tag {
      font-size: 12.5px; color: var(--muted-2, var(--muted));
      border: 1px solid var(--line); border-radius: 999px;
      padding: 3px 12px; text-decoration: none;
      transition: color .15s, border-color .15s;
    }
    .tag::before { content: "#"; color: var(--cyan-dim); }
    .tag:hover { color: var(--cyan); border-color: var(--cyan); text-decoration: none; }

    /* ===== Ссылки-списки ===== */
    .links { list-style: none; padding: 0; margin: 0; }
    .links li { padding: 8px 0; border-bottom: 1px dashed var(--line); }
    .links li:last-child { border-bottom: 0; }
    .links .desc { color: var(--muted); font-size: 13.5px; }

    /* ===== Поиск ===== */
    .search-box {
      display: flex; align-items: center; gap: 10px;
      border: 1px solid var(--line); border-radius: 8px; background: var(--surface);
      padding: 0 14px; margin: 20px 0 26px;
    }
    .search-box::before { content: "$"; color: var(--magenta); font-weight: 700; }
    .search-box input {
      flex: 1; font: inherit; font-size: 14.5px;
      background: none; border: 0; outline: none;
      color: var(--ink); padding: 12px 0;
    }
    .search-box input::placeholder { color: var(--muted); }
    .search-box:focus-within { border-color: var(--cyan); }
    .search-count { color: var(--muted); font-size: 13px; }
    .search-snippet { display: block; font-size: 13px; color: var(--muted); margin-top: 2px; }
    .search-snippet mark { background: var(--magenta); color: #fff; padding: 0 2px; border-radius: 2px; }

    /* ===== Статья ===== */
    .prose { max-width: 72ch; }
    .post-title {
      font-size: clamp(24px, 3.6vw, 34px); font-weight: 800;
      letter-spacing: -0.01em; line-height: 1.3;
      margin: 8px 0 10px;
      text-shadow: 2px 2px 0 var(--ghost);
    }
    .post-cover {
      border: 1px solid var(--line); border-radius: 8px;
      margin: 20px 0 26px; width: 100%;
    }
    .post-meta { color: var(--muted); font-size: 13.5px; margin: 2px 0 14px; }
    .post-meta .dot { color: var(--cyan-dim); }
    .intro { color: var(--muted); font-size: 15.5px; margin-bottom: 22px; }
    .prose h2 { margin-top: 44px; }
    .prose h2::before { content: "## "; color: var(--cyan-dim); font-weight: 400; }
    .prose h3::before { content: "### "; color: var(--cyan-dim); font-weight: 400; }
    .prose a { text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--cyan-dim); }
    .prose a:hover { text-decoration-color: var(--cyan); }
    ul, ol { margin: 12px 0; padding-left: 1.3em; }
    li { margin-bottom: 5px; }
    li::marker { color: var(--cyan-dim); }
    figure { margin: 26px 0; }
    .content img { border: 1px solid var(--line); border-radius: 8px; margin: 26px auto; }
    figcaption { font-size: 13px; color: var(--muted); margin-top: 8px; }
    blockquote {
      border-left: 3px solid var(--cyan-dim);
      background: var(--surface);
      margin: 22px 0; padding: 12px 18px;
      font-style: italic; border-radius: 0 6px 6px 0;
    }
    blockquote p { margin: 0; }
    table { width: 100%; border-collapse: collapse; margin: 22px 0; font-size: 14px; }
    th, td { border: 1px solid var(--line); padding: 8px 12px; text-align: left; vertical-align: top; }
    th { background: var(--surface); }
    hr { border: 0; border-top: 1px solid var(--line); margin: 36px 0; }

    code {
      font-family: var(--font); font-size: .88em;
      background: var(--surface-2); border: 1px solid var(--line);
      padding: 1px 5px; border-radius: 4px;
    }
    pre {
      background: var(--surface) !important;
      border: 1px solid var(--line); border-radius: 8px;
      padding: 16px 18px; overflow-x: auto;
      font-size: 13.5px; line-height: 1.6; margin: 24px 0;
    }
    pre code { background: none; border: 0; padding: 0; }
    .highlight pre { background: var(--surface) !important; }
    pre.mermaid { background: transparent !important; border: 0; padding: 8px 0; text-align: center; }
    pre.mermaid svg { max-width: 100%; height: auto; }
    .code-block { position: relative; margin: 24px 0; }
    .code-block pre { margin: 0; }
    .code-copy, .callout-copy {
      position: absolute; top: 8px; right: 8px;
      font: 12px var(--font); color: var(--muted);
      background: var(--surface-2); border: 1px solid var(--line);
      border-radius: 5px; padding: 3px 9px; cursor: pointer;
    }
    .code-copy:hover, .callout-copy:hover { color: var(--cyan); border-color: var(--cyan); }

    .callout {
      position: relative;
      border: 1px solid var(--line); border-left: 3px solid var(--cyan-dim);
      background: var(--surface); border-radius: 0 8px 8px 0;
      padding: 14px 18px; margin: 22px 0;
    }
    .callout.warning { border-left-color: var(--red); }
    .callout.insight { border-left-color: var(--green); }
    .callout.prompt { border-left-color: var(--magenta); }
    .callout.cta { border: 1px solid var(--magenta); border-left-width: 3px; }
    .callout strong { display: block; margin-bottom: 4px; }
    .callout p:last-child { margin-bottom: 0; }
    .callout-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .callout-head strong { margin-bottom: 0; font-size: 13.5px; }
    .callout-copy { position: static; flex-shrink: 0; }

    .sources, .related-posts { margin-top: 40px; padding-top: 22px; border-top: 1px solid var(--line); }
    .sources h3, .related-posts h3 { font-size: 14px; margin: 0 0 10px; }
    .sources ul, .related-posts ul { list-style: none; padding: 0; margin: 0; }
    .sources li, .related-posts li { margin-bottom: 6px; }

    .rel-cards { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); margin-top: 14px; }
    .rel-cards .card-title { font-size: 13.5px; }

    .subscribe-inline {
      margin: 34px 0 8px; padding: 14px 18px;
      border: 1px dashed var(--cyan-dim); border-radius: 8px;
      font-size: 14px;
    }
    .subscribe-inline .k { color: var(--magenta); font-weight: 700; }

    .author-link { font-size: 13.5px; }

    @media (prefers-color-scheme: light) {
      .chip, .card, .video-item, .search-box, .yt-feature, .callout, pre, .tag { border-color: var(--line-strong); }
    }

    /* ===== Адаптив ===== */
    @media (max-width: 640px) {
      body { font-size: 15px; }
      main.wrap { padding-top: 28px; }
      .site-nav { gap: 14px; }
      .hero { padding-top: 26px; }
      .posts li { flex-direction: column; gap: 0; padding: 12px 0; }
      .date { min-width: 0; }
      .video-item img { width: 80px; height: 45px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body class="kind-{{ .Kind }} section-{{ .Section }}">
  <header class="site-head">
    <div class="wrap">
      <a class="wordmark" href="/">sereja.tech</a>
      <nav class="site-nav" aria-label="Основная навигация">
        <a href="/blog/"{{ if eq .Section "blog" }} class="active"{{ end }}>блог</a>
        <a href="/about/"{{ if eq .Section "about" }} class="active"{{ end }}>обо мне</a>
        <a href="https://t.me/ris_ai?utm_source=sereja_tech&utm_medium=link&utm_campaign=nav" target="_blank" rel="noopener">телеграм</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-foot">
    <div class="wrap">
      <span>© 2026 Сережа Рис · sereja.tech</span>
      <span class="foot-links">
        <a href="https://t.me/ris_ai?utm_source=sereja_tech&utm_medium=link&utm_campaign=footer" target="_blank" rel="noopener">телеграм</a>
        <a href="https://www.youtube.com/@serejaris?utm_source=sereja_tech&utm_medium=link&utm_campaign=footer" target="_blank" rel="noopener">youtube</a>
        <a href="https://github.com/serejaris" target="_blank" rel="noopener">github</a>
        <a href="/index.xml">rss</a>
      </span>
    </div>
  </footer>

  <script defer src="/_vercel/insights/script.js"></script>
  {{ if .IsPage }}<script src="/analytics.js"></script>{{ end }}
  {{ if .Store.Get "hasMermaid" }}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'neutral', securityLevel: 'strict', htmlLabels: true });
  </script>
  {{ end }}
</body>
</html>
