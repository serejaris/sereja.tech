{{ define "main" }}
<p class="crumb"><a href="/blog/">← блог</a></p>
<h1 class="post-title">{{ .Title }}</h1>
<p class="intro">{{ len .Pages }} {{ if le (len .Pages) 4 }}статьи{{ else }}статей{{ end }} с тегом &laquo;{{ .Title }}&raquo;</p>
<ul class="posts">
  {{ range .Pages.ByDate.Reverse }}
  <li>
    <span class="date">{{ partial "fdate.html" (dict "date" .Date) }}</span>
    <a href="{{ .Permalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}
